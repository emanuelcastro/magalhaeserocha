# Painel de conteúdo (Decap CMS)
#
# base_url aponta para o provedor de OAuth publicado a partir da pasta
# oauth-provider/ (ver oauth-provider/README.md). O login só funciona depois
# que as env vars forem preenchidas no projeto Vercel e o GitHub OAuth App
# estiver criado com a callback URL correta.
backend:
  name: github
  repo: emanuelcastro/magalhaeserocha
  branch: main
  base_url: https://magalhaeserocha.vercel.app
  auth_endpoint: api/begin

site_url: https://magalhaeserocha.com.br
display_url: https://magalhaeserocha.com.br
logo_url: /images/logo/icone-app-navy.jpg

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "noticias"
    label: "Notícias"
    label_singular: "Notícia"
    description: "Atualizações rápidas do escritório (aparecem em /noticias)"
    folder: "src/content/noticias"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - label: "Autora"
        name: "autor"
        widget: "select"
        options:
          - { label: "Dra. Rosinê Magalhães", value: "rosine-magalhaes" }
          - { label: "Dra. Larissa Rocha", value: "larissa-rocha" }
      - { label: "Data de publicação", name: "date", widget: "datetime" }
      - { label: "Resumo (aparece na lista de notícias)", name: "excerpt", widget: "text" }
      - { label: "Imagem de capa", name: "cover", widget: "image", required: false }
      - { label: "Conteúdo", name: "body", widget: "markdown" }

  - name: "artigos"
    label: "Artigos"
    label_singular: "Artigo"
    description: "Análises jurídicas mais aprofundadas (aparecem em /artigos)"
    folder: "src/content/artigos"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - label: "Autora"
        name: "autor"
        widget: "select"
        options:
          - { label: "Dra. Rosinê Magalhães", value: "rosine-magalhaes" }
          - { label: "Dra. Larissa Rocha", value: "larissa-rocha" }
      - { label: "Data de publicação", name: "date", widget: "datetime" }
      - { label: "Resumo (aparece na lista de artigos)", name: "excerpt", widget: "text" }
      - { label: "Imagem de capa", name: "cover", widget: "image", required: false }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
